<!DOCTYPE html>
<html lang="fr" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion — Dev Center</title>
  <link rel="stylesheet" href="../assets/css/theme.css" />
  <link rel="stylesheet" href="../assets/css/admin.css" />
</head>

<body>

  <div class="auth-overlay" id="auth-loading" style="display:flex">
    <div class="auth-box">
      <div class="auth-spinner"></div>
      <h2>CONNEXION...</h2>
      <p style="font-family:'Space Mono',monospace;font-size:.72rem">Finalisation de l'authentification Discord.</p>
    </div>
  </div>

  <div class="auth-overlay" id="auth-error" style="display:none">
    <div class="auth-box">
      <div class="auth-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--red)" stroke-width="1.8"
          stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10" />
          <line x1="4.93" y1="4.93" x2="19.07" y2="19.07" />
        </svg>
      </div>
      <h2>ECHEC_CONNEXION</h2>
      <p id="auth-error-msg">La connexion Discord a echoue. Veuillez reessayer.</p>
      <div class="auth-actions">
        <a class="btn-admin ghost" href="../admin/index.html" style="text-decoration:none;justify-content:center">&larr;
          RETOUR_ADMIN</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../assets/js/supabase.js"></script>
  <script>
    (function () {
      const t = localStorage.getItem('dc-theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
    })();

    function showError(msg) {
      document.getElementById('auth-loading').style.display = 'none';
      document.getElementById('auth-error').style.display = 'flex';
      if (msg) document.getElementById('auth-error-msg').textContent = msg;
    }

    async function completeLogin() {
      await initSupabase();
      if (!_supabaseClient) {
        showError('Supabase non configure sur ce site.');
        return;
      }

      // supabase-js v2 parses the OAuth redirect (hash/query) automatically on
      // client creation when detectSessionInUrl is true. We just need to wait
      // for that to settle before reading the session.
      let session = null;
      for (let i = 0; i < 10 && !session; i++) {
        const { data } = await _supabaseClient.auth.getSession();
        session = data?.session || null;
        if (!session) await new Promise(r => setTimeout(r, 250));
      }

      if (!session) {
        showError("Aucune session trouvee. La connexion Discord a peut-etre ete annulee.");
        return;
      }

      window.location.replace('../admin/index.html');
    }

    completeLogin();
  </script>
</body>

</html>
